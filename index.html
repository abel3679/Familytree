<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Family Tree</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f6f9; color: #333;
        }
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #2c3e50; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999; color: white;
        }
        .login-box {
            background: white; padding: 30px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center;
            color: #333; width: 85%; max-width: 320px;
        }
        .login-box input {
            width: 100%; padding: 12px; margin: 15px 0;
            border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
        }
        .login-box button {
            background-color: #27ae60; color: white; border: none;
            padding: 12px 20px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold;
        }
        #error-msg { color: #c0392b; font-size: 14px; margin-top: 8px; display: none; }
        
        #header {
            background-color: #2c3e50; color: white; padding: 15px;
            text-align: center; font-size: 20px; font-weight: bold;
        }
        
        /* Interactive tree canvas container */
        .tree-container {
            padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 40px;
            overflow-y: auto; height: calc(100vh - 60px); box-sizing: border-box;
        }
        .generation {
            display: flex; justify-content: center; gap: 20px; width: 100%; flex-wrap: wrap;
        }
        .node {
            background: white; padding: 12px 20px; border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); min-width: 120px; text-align: center;
            font-weight: 500; font-size: 15px; border-left: 5px solid #bdc3c7;
        }
        .male { border-left-color: #3498db; }
        .female { border-left-color: #e74c3c; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Family Portal</h2>
            <p>Enter password to view tree.</p>
            <input type="password" id="password-input" placeholder="Password" onkeypress="if(event.key==='Enter') checkPassword()">
            <button onclick="checkPassword()">Access Tree</button>
            <div id="error-msg">Incorrect password.</div>
        </div>
    </div>

    <div id="header">Our Family History</div>
    
    <div class="tree-container">
        <div class="generation">
            <div class="node male">Grandfather</div>
            <div class="node female">Grandmother</div>
        </div>
        
        <div class="generation">
            <div class="node male">Father</div>
            <div class="node female">Mother</div>
        </div>
        
        <div class="generation">
            <div class="node male">Brother</div>
            <div class="node male">Abel</div>
            <div class="node female">Sister</div>
        </div>

        <div class="generation">
            <div class="node male">Son</div>
            <div class="node female">Daughter 1</div>
            <div class="node female">Daughter 2</div>
        </div>
    </div>

    <script>
        function checkPassword() {
            const userInput = document.getElementById("password-input").value;
            if (userInput === "OurFamily2026") {
                document.getElementById("login-screen").remove();
            } else {
                document.getElementById("error-msg").style.display = "block";
                document.getElementById("password-input").value = "";
            }
        }
    </script>
</body>
</html>
