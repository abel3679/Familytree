<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Family Tree</title>
    <!-- Stable tree rendering engine -->
    <script src="https://balkan.app/js/familytree.js"></script>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f6f9; overflow: hidden;
        }
        /* Secure Lock Screen */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #2c3e50; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999; color: white;
        }
        .login-box {
            background: white; padding: 30px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center;
            color: #333; width: 85%; max-width: 320px;
        }
        .login-box input {
            width: 100%; padding: 12px; margin: 15px 0;
            border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px;
        }
        .login-box button {
            background-color: #27ae60; color: white; border: none;
            padding: 12px 20px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px;
        }
        #error-msg { color: #c0392b; font-size: 14px; margin-top: 8px; display: none; }
        
        /* Main Layout */
        #header {
            background-color: #2c3e50; color: white; padding: 15px 20px;
            text-align: center; position: absolute; top: 0; left: 0; right: 0;
            height: 60px; box-sizing: border-box; z-index: 10;
        }
        #header h1 { margin: 0; font-size: 22px; }
        
        /* Interactive Canvas */
        #tree {
            width: 100vw; height: calc(100vh - 60px);
            position: absolute; top: 60px; left: 0; box-sizing: border-box;
        }

        /* Detail Modal Popup */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); display: none;
            justify-content: center; align-items: center; z-index: 5000;
        }
        .modal-content {
            background: white; padding: 25px; border-radius: 10px;
            width: 85%; max-width: 380px; box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            position: relative; font-size: 15px;
        }
        .close-btn { position: absolute; top: 12px; right: 15px; font-size: 22px; cursor: pointer; color: #7f8c8d; font-weight: bold; }
        .modal-content h3 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 8px; }
        .info-row { margin: 12px 0; }
        .info-label { font-weight: bold; color: #7f8c8d; display: inline-block; width: 110px; }
    </style>
</head>
<body>

    <!-- Access Gate -->
    <div id="login-screen">
        <div class="login-box">
            <h2>Family Portal</h2>
            <p>Enter password to view tree.</p>
            <input type="password" id="password-input" placeholder="Password" onkeypress="if(event.key==='Enter') checkPassword()">
            <button onclick="checkPassword()">Access Tree</button>
            <div id="error-msg">Incorrect password.</div>
        </div>
    </div>

    <div id="header">
        <h1>Our Family History</h1>
    </div>
    
    <div id="tree"></div>

    <!-- Details View Modal -->
    <div class="modal-overlay" id="profile-modal" onclick="document.getElementById('profile-modal').style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="document.getElementById('profile-modal').style.display='none'">&times;</span>
            <h3 id="m-name">-</h3>
            <div class="info-row"><span class="info-label">Date of Birth:</span><span id="m-dob">-</span></div>
            <div class="info-row"><span class="info-label">Gender:</span><span id="m-gender">-</span></div>
            <div class="info-row"><span class="info-label">Status:</span><span id="m-status">-</span></div>
            <div class="info-row"><span class="info-label">Description:</span><p id="m-desc" style="margin:5px 0 0 0; color:#555;"></p></div>
        </div>
    </div>

            { id: "acsah_s", name: "Acsah J Sam", gender: "female", fid: "samkutty_j", mid: "sudha_m" },

            { id: "mercy_j", name: "Mercy Jovel", gender: "female", fid: "yovel", mid: "kunjamma", pids: ["jacob_p"] },
            { id: "jacob_p", name: "Jacob Philip", gender: "male", pids: ["mercy_j"] },

        // Unique profile details database for popup modals
        const profileDetails = {
            "yovel": { dob: "01/01/1915", status: "Deceased", desc: "Our beloved great-patriarch." },
            "kunjamma": { dob: "10/05/1922", status: "Deceased", desc: "Our beloved great-matriarch." },

            "sudha_m": { dob: "22/09/1972", status: "Alive", desc: "Caring and supportive mother." },
            "abel_s": { dob: "14/10/2003", status: "Alive", desc: "Finance professional and qualified Certified Management Accountant (CMA USA)." },
            "acsah_s": { dob: "18/11/2008", status: "Alive", desc: "Brilliant sister." }
        };

        // Initialize dynamic graphic board canvas template map
        const chart = new FamilyTree(document.getElementById("tree"), {
            nodes: familyData,
            nodeBinding: { field_0: "name" },
            template: "tomorrow"
        });

        // Click interaction hook event to launch profile data rows
        chart.on('click', function(sender, args){
            const nodeData = familyData.find(n => n.id === args.node.id);
            if (!nodeData) return false;

            const extra = profileDetails[nodeData.id] || { dob: "N/A", status: "Alive", desc: "No custom description added yet." };
            
            document.getElementById("m-name").innerText = nodeData.name;
            document.getElementById("m-dob").innerText = extra.dob;
            document.getElementById("m-gender").innerText = nodeData.gender.toUpperCase();
            document.getElementById("m-status").innerText = extra.status;
            document.getElementById("m-desc").innerText = extra.desc;
            
            document.getElementById("profile-modal").style.display = "flex";
            return false; // Blocks default built-in side-panels from popping open

</body>
</html>
